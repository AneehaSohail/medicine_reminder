<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Medicine Reminder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <section class="hero">
      <div>
        <p class="badge">Personal Health Reminder</p>
        <h1>Medicine Reminder</h1>
        <p>Keep track of your doses, next timing, and medicine schedule easily.</p>
      </div>

      <button id="notifyBtn">Enable Notifications</button>
    </section>

    <section class="summary">
      <div>
        <h3>Today’s Medicines</h3>
        <p>Tap “I took it” after taking each dose.</p>
      </div>
    </section>

    <section id="medicineList" class="grid"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
